<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fffaf1" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1a1410" media="(prefers-color-scheme: dark)" />
    <title>cstd-design</title>
    <script>if(localStorage.getItem("cstd-design:dark")==="true"||(localStorage.getItem("cstd-design:dark")===null&&matchMedia("(prefers-color-scheme:dark)").matches))document.documentElement.classList.add("theme-dark")</script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
